name: Deploy Nuxt to Plesk on Netcup

on:
  push:
    branches:
      - main  # Oder 'master', je nachdem wie dein Branch heißt

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. Code herunterladen
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # 2. Node.js installieren
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Abhängigkeiten installieren & Seite bauen
      - name: 🔨 Install & Build
        run: |
          npm install
          npm run generate

      # 4. Per FTP hochladen
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # WICHTIG: Das ist der lokale Ordner, den Nuxt erstellt hat
          local-dir: ./.output/public/
          # WICHTIG: Wohin auf dem Server?
          # Wenn dein FTP-User direkt im httpdocs Ordner startet: './'
          # Wenn er im Root startet: './httpdocs/' oder './tc-hardt-nuxt4.v0id.de/httpdocs/'
          server-dir: ./
          protocol: ftp
          dangerous-clean-slate: true # Löscht alte Dateien auf dem Server (Vorsicht!)
