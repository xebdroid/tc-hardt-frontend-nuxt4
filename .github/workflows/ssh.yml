name: Deploy Nuxt (Atomic SSH/SCP)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Atomic Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. Code holen
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # 2. Node.js Setup
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Bauen
      - name: 🔨 Install & Build
        run: |
          npm install
          npm run generate

      # 4. Packen (Wir packen den INHALT von public direkt in das Archiv)
      - name: 📦 Compress files
        run: tar -czf site.tar.gz -C .output/public .

      # 5. Hochladen (nutzt jetzt SSH_* Secrets)
      - name: 📤 Upload Artifact
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "site.tar.gz"
          # Zielpfad auf dem Server
          target: "/tc-hardt-nuxt4.v0id.de/httpdocs/"

      # 6. Entpacken auf dem Server
      - name: 🚀 Extract & Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            # Gehe in den Ordner (bricht ab, falls er nicht existiert)
            cd /tc-hardt-nuxt4.v0id.de/httpdocs/ || exit 1

            # Entpacken (überschreibt existierende Dateien)
            tar -xzf site.tar.gz

            # Aufräumen
            rm site.tar.gz
