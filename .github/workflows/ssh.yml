name: Deploy Nuxt

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      method:
        description: 'Wähle die Deploy-Methode'
        required: true
        default: 'rsync'
        type: choice
        options:
          - rsync
          - atomic_tar

jobs:
  web-deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔨 Install & Build
        run: |
          npm install
          npm run generate

      # Methode 1: Schneller rsync (Standard bei Push)
      - name: 🔄 Sync with rsync
        if: github.event_name == 'push' || github.event.inputs.method == 'rsync'
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: .output/public/
          remote_path: /tc-hardt-nuxt4.v0id.de/httpdocs/
          remote_host: ${{ secrets.SSH_SERVER }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Methode 2: Atomic Deployment via TAR (Nur manuell)
      - name: 📦 Compress files (Atomic)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.method == 'atomic_tar'
        run: tar -czf site.tar.gz -C .output/public .

      - name: 📤 Upload Artifact (Atomic)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.method == 'atomic_tar'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "site.tar.gz"
          target: "/tc-hardt-nuxt4.v0id.de/httpdocs/"

      - name: 🚀 Extract & Clean (Atomic)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.method == 'atomic_tar'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_SERVER }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /tc-hardt-nuxt4.v0id.de/httpdocs/ || exit 1
            tar -xzf site.tar.gz
            rm site.tar.gz
