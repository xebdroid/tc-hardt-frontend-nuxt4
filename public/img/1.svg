<svg
  viewBox="0 0 26 26"
  xmlns="http://www.w3.org/2000/svg"
>
  <mask id="curve-mask">
    <!-- alles sichtbar -->
    <rect width="26" height="26" fill="white" />

    <!-- Rundung wird ausgestanzt -->
    <path
      d="M 0 0
         C 0 14.359 11.641 26 26 26
         L 26 0
         Z"
      fill="black"
    />
  </mask>

  <!-- Fläche, aus der die Rundung ausgeschnitten wird -->
  <rect
    width="26"
    height="26"
    fill="currentColor"
    mask="url(#curve-mask)"
  />
</svg>
